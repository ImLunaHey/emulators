# Builds and attaches release artifacts. Invoked by release-please.yml right
# after it creates a release — a release made with GITHUB_TOKEN does NOT emit a
# `release: published` event, so we're called directly (workflow_call) rather
# than triggering off the release event. Heavy native/app builds therefore only
# run on a real release, never on ordinary pushes/PRs.
#
# Artifacts (native per OS, plus the cross-platform RetroArch core):
#   - libretro core:  macOS universal .dylib, Linux .so, Windows .dll
#   - macOS app:      EmuApp (SwiftUI) — bundled .app, zipped
#   - Windows app:    WinApp (WPF / .NET) — self-contained, zipped
name: release-build

on:
  workflow_call:
    inputs:
      tag:
        description: The release tag to attach artifacts to (e.g. v0.1.1)
        required: true
        type: string
  # Allow manual re-runs against an existing tag if a build needs retrying.
  workflow_dispatch:
    inputs:
      tag:
        description: The release tag to attach artifacts to (e.g. v0.1.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  libretro:
    name: libretro core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   asset: emu_libretro-macos.dylib }
          - { os: ubuntu-latest,  asset: emu_libretro-linux.so }
          - { os: windows-latest, asset: emu_libretro-windows.dll }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/libretro

      - name: Build (macOS universal)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cd packages/libretro
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/libemu_libretro.dylib \
            target/x86_64-apple-darwin/release/libemu_libretro.dylib \
            -output "$GITHUB_WORKSPACE/${{ matrix.asset }}"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd packages/libretro && cargo build --release
          cp target/release/libemu_libretro.so "$GITHUB_WORKSPACE/${{ matrix.asset }}"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd packages/libretro && cargo build --release
          cp target/release/emu_libretro.dll "$GITHUB_WORKSPACE/${{ matrix.asset }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ matrix.asset }}

  emuapp-macos:
    name: macOS app (EmuApp)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/native

      - name: Build native lib (universal) + sync header
        run: ./scripts/build-macos.sh --universal

      - name: Build app (universal)
        run: cd apps/EmuApp && swift build -c release --arch arm64 --arch x86_64

      - name: Bundle .app
        shell: bash
        run: |
          BIN="$(cd apps/EmuApp && swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/EmuApp"
          APP=EmuApp.app
          mkdir -p "$APP/Contents/MacOS"
          cp "$BIN" "$APP/Contents/MacOS/EmuApp"
          cp apps/EmuApp/Info.plist "$APP/Contents/Info.plist"
          codesign -s - --force --deep "$APP" || true
          ditto -c -k --sequesterRsrc --keepParent "$APP" EmuApp-macos.zip

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: EmuApp-macos.zip

  winapp-windows:
    name: Windows app (WinApp)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/native
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build core DLL (cargo)
        shell: bash
        run: |
          cd packages/native && cargo build --release
          cp target/release/emu_native.dll ../../apps/WinApp/emu_native.dll

      - name: Publish WPF app (self-contained win-x64)
        shell: bash
        run: |
          cd apps/WinApp
          dotnet publish -c Release -r win-x64 --self-contained true \
            -p:IncludeNativeLibrariesForSelfExtract=true -o publish
          cp emu_native.dll publish/emu_native.dll

      - name: Zip
        shell: bash
        run: |
          cd apps/WinApp/publish
          7z a "$GITHUB_WORKSPACE/imlunahey-emulator-windows.zip" ./*

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: imlunahey-emulator-windows.zip
