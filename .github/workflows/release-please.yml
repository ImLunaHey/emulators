# Runs release-please on every push to main. It maintains a "release PR" that
# accumulates the conventional-commit changelog and version bump; merging that
# PR creates a GitHub Release + tag (vX.Y.Z), which triggers release-build.yml.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
