# Runs release-please on every push to main. It maintains a "release PR" that
# accumulates the conventional-commit changelog and version bump; merging that
# PR creates a GitHub Release + tag (vX.Y.Z), which triggers release-build.yml.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # A release created via GITHUB_TOKEN does NOT emit a `release: published`
  # event (GitHub's recursion guard), so we can't rely on release-build.yml's
  # own trigger. Instead we call it directly here when a release was created.
  release-build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release-build.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
