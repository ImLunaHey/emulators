name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/*/Cargo.lock') }}

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Rust core unit tests (gba package's `test` script: cargo test).
      - name: Rust tests
        run: pnpm turbo run test

      # Build the web app and every wasm core it depends on. Turbo's `^build`
      # builds all packages/* cores (wasm-pack -> pkg/) BEFORE the web build's
      # `tsc && vite build`, so typecheck sees the generated .d.ts files.
      - name: Build web + cores
        run: pnpm turbo run build --filter=@emulators/web

      - name: Lint
        run: pnpm turbo run lint --filter=@emulators/web

  # Build the wasm cores + web app here and push the prebuilt output to
  # Cloudflare, instead of letting Cloudflare's git integration build it.
  # NOTE: disable the Cloudflare-side build (Workers > Settings > Builds) so
  # the two don't race. Requires repo secrets CLOUDFLARE_API_TOKEN and
  # CLOUDFLARE_ACCOUNT_ID.
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/*/Cargo.lock') }}

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds all wasm cores, then the web app (apps/web/dist) via turbo.
      - name: Build web + cores
        run: pnpm turbo run build --filter=@emulators/web

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
