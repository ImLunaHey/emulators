[package]
name = "sms-core"
version = "0.0.0"
edition = "2021"

# Pure-Rust Sega Master System + Game Gear core, built from-scratch against the
# SMS Power! hardware spec, the Zilog Z80 user manual, and the TMS9918/SMS VDP
# docs — there is no source to port. ONE core handles both systems: Game Gear is
# a portable Master System (same Z80 + VDP + SN76489 PSG), differing only in
# screen crop, palette format, and a few GG-specific ports.
#
# Builds as a normal rlib for host-side `cargo test`; the web target layers a
# wasm-bindgen surface on top. The core stays binding-agnostic.
[lib]
crate-type = ["cdylib", "rlib"]

# wasm-bindgen is only used by the `target_arch="wasm32"` `wasm` module, so it's
# a wasm-only dependency. Native builds (host `cargo test`) never pull it.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

[profile.release]
opt-level = 3
lto = true
# One codegen unit lets LLVM optimize across the whole interpreter.
codegen-units = 1
# No unwinding — a panic in the emulator is unrecoverable anyway. (cargo test
# runs the dev profile, so #[should_panic] still works.)
panic = "abort"

# Optimize the release wasm harder than wasm-pack's default `-O`.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O3']

[dev-dependencies]

[dependencies]
