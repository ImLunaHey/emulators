[package]
name = "genesis-core"
version = "0.0.0"
edition = "2021"

# Pure-Rust Sega Genesis / Mega Drive core, built from-scratch against public
# hardware documentation (the Motorola 68000 Programmer's Reference, the Sega
# 315-5313 VDP notes, plutiedev.com, and the Z80/SN76489 specs reused from the
# sibling SMS core). There is no source to port.
#
# Builds as a normal rlib for host-side `cargo test`; the web target layers a
# wasm-bindgen surface on top. The core stays binding-agnostic.
[lib]
crate-type = ["cdylib", "rlib"]

# wasm-bindgen is only used by the `target_arch="wasm32"` `wasm` module, so it's
# a wasm-only dependency. Native builds (host `cargo test`) never pull it.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

[profile.release]
opt-level = 3
lto = true
# One codegen unit lets LLVM optimize across the whole interpreter.
codegen-units = 1
# No unwinding — a panic in the emulator is unrecoverable anyway. (cargo test
# runs the dev profile, so #[should_panic] still works.)
panic = "abort"

# Optimize the release wasm harder than wasm-pack's default `-O`.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O3']

[dev-dependencies]

[dependencies]
