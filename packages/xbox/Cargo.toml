[package]
name = "xbox-core"
version = "0.0.0"
edition = "2021"

# From-scratch original Microsoft Xbox (2001, codename "Xbox") core, built
# against public hardware references (the xbox-linux / XboxDevWiki documentation
# and the Intel IA-32 manuals). The seventh core in this repo, sibling of the
# GBA/NDS/PS1/GBC/NES/SMS/GC cores. This is strictly FOUNDATION work: the Intel
# Pentium III "Coppermine" IA-32 register/exception state, a starter
# integer-instruction interpreter (real- and flat-protected-mode), the 64 MB
# unified-memory map, the bus, and an Nvidia NV2A framebuffer stub. A full Xbox
# emulator (the NV2A 3D pipeline, the MCPX/southbridge, the APU, USB controllers,
# the IDE/DVD, and the encrypted 2BL/kernel boot) is a multi-year effort layered
# on top of this — none of it is attempted here.
#
# Builds as a normal rlib for host-side `cargo test`; the web target layers a
# wasm-bindgen surface (`src/wasm.rs`) on top, exactly like the PS1/GC cores.
[lib]
crate-type = ["cdylib", "rlib"]

# wasm-bindgen is only used by the `target_arch="wasm32"` `wasm` module, so it's
# a wasm-only dependency. Native builds (host `cargo test`) never pull it.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O3']

[profile.release]
opt-level = 3
lto = true
# One codegen unit lets LLVM optimize across the whole interpreter (no per-unit
# boundaries blocking inlining of the monomorphized bus accesses).
codegen-units = 1
# No unwinding — a panic in the emulator is unrecoverable anyway. Drops the
# landing-pad tables, shrinking the binary and trimming the hot paths. (cargo
# test runs the dev profile, so #[should_panic] still works.)
panic = "abort"

[dependencies]
