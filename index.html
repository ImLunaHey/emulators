<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gba-recomp — Pokemon FireRed</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; background: #0a0a0c; color: #e7e7ea; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; height: 100%; }
      body { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px; }
      header { width: 100%; max-width: 720px; display: flex; justify-content: space-between; align-items: baseline; }
      header h1 { font-size: 14px; margin: 0; letter-spacing: 0.04em; opacity: 0.8; }
      header .stats { font-size: 11px; opacity: 0.6; }
      canvas { image-rendering: pixelated; image-rendering: crisp-edges; background: #000; border: 1px solid #1c1c20; width: 720px; height: 480px; box-shadow: 0 0 60px rgba(0,0,0,0.7); }
      .row { display: flex; gap: 12px; font-size: 11px; opacity: 0.7; }
      .row b { color: #b8b8c4; font-weight: 600; }
      .log { width: 720px; height: 120px; overflow: auto; background: #0e0e12; border: 1px solid #1c1c20; padding: 8px; font-size: 11px; color: #9a9aa6; white-space: pre-wrap; }
      button { background: #1c1c22; color: #d8d8e0; border: 1px solid #2a2a30; padding: 6px 12px; font-family: inherit; font-size: 11px; cursor: pointer; border-radius: 4px; }
      button:hover { background: #24242a; }
    </style>
  </head>
  <body>
    <header>
      <h1>GBA-RECOMP · Pokemon FireRed (USA, Rev 1) · Hybrid WASM</h1>
      <div class="stats" id="stats">— fps · — Mhz · int 0% · jit 0%</div>
    </header>
    <canvas id="screen" width="240" height="160"></canvas>
    <div class="row">
      <span><b>D-Pad</b> Arrows</span>
      <span><b>A</b> Z</span>
      <span><b>B</b> X</span>
      <span><b>L</b> A</span>
      <span><b>R</b> S</span>
      <span><b>Start</b> Enter</span>
      <span><b>Select</b> Shift</span>
      <select id="rom" style="background:#1c1c22;color:#d8d8e0;border:1px solid #2a2a30;padding:6px;font-family:inherit;font-size:11px;border-radius:4px">
        <option value="/firered.gba">Pokemon FireRed</option>
        <option value="/emerald.gba">Pokemon Emerald</option>
        <option value="/ruby.gba">Pokemon Ruby</option>
      </select>
      <button id="pause">Pause</button>
      <button id="reset">Reset</button>
    </div>
    <div class="log" id="log"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
